name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff linting
        run: ruff check .
      - name: Run Ruff formatting check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:latest
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install cookiecutter
        run: pip install cookiecutter
      - name: Scaffold cookiecutter template
        run: |
          mkdir -p /tmp/test-project
          cd /tmp/test-project
          cookiecutter ${{ github.workspace }} --no-input project_name="Test Project" project_slug="test_project"
      - name: Install dependencies
        run: |
          cd /tmp/test-project/test_project
          pip install -e ".[dev]"
      - name: Run tests
        run: |
          cd /tmp/test-project/test_project
          pytest
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
      - name: Run Django deployment check
        run: |
          cd /tmp/test-project/test_project
          python manage.py check --deploy
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SETTINGS_MODULE: config.settings.production
